const SYSTEM_PROMPT = `당신은 '2026 국세청 인증 모범납세자 맛집' 전용 AI 비서입니다.

[데이터 가이드라인]
1. 반드시 아래 [맛집 데이터 리스트]에 명시된 식당만 추천하십시오.
2. 리스트에 없는 식당 정보를 절대 생성하거나 검색하지 마십시오.
3. 리스트에 없는 정보를 요청받으면 "죄송합니다. 현재 모범납세자 인증 데이터에 해당 정보는 등록되어 있지 않습니다."라고 답하십시오.
4. 사용자의 상황(데이트, 가족 식사 등)에 맞게 리스트 내 식당을 큐레이션하여 답변하십시오.

[맛집 데이터 리스트]
${JSON.stringify(RESTAURANTS)}

[답변 형식]
- 각 식당 이름 앞에는 ✨ 이모지를 사용하십시오.
- 지역과 대표 메뉴를 강조하십시오.`;

let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

  const icon = role === 'assistant' ? `<div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600 shrink-0 border border-indigo-200 text-sm">🍴</div>` : '';

  const bubbleColor = role === 'user'
    ? 'bg-indigo-600 text-white rounded-tr-none'
    : 'bg-white text-slate-800 rounded-tl-none border border-slate-200';

  const align = role === 'user' ? 'text-right' : 'text-left';
  const flexDir = role === 'user' ? 'flex-row-reverse' : 'flex-row';

  wrapper.innerHTML = `
    <div class="flex gap-3 max-w-[85%] ${flexDir}">
      ${icon}
      <div class="space-y-1">
        <div class="px-4 py-3 rounded-2xl shadow-sm text-sm ${bubbleColor}">
          <div class="whitespace-pre-wrap leading-relaxed">${escapeHtml(text)}</div>
        </div>
        <p class="text-[10px] text-slate-400 font-medium ${align}">${getTime()}</p>
      </div>
    </div>`;

  container.appendChild(wrapper);
  scrollToBottom();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showLoading() {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.id = 'loading-indicator';
  el.className = 'flex justify-start items-center gap-3';
  el.innerHTML = `
    <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center animate-pulse text-slate-400 text-xs">
      <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </div>
    <div class="h-4 w-20 bg-slate-200 rounded-full animate-pulse"></div>`;
  container.appendChild(el);
  scrollToBottom();
}

function hideLoading() {
  document.getElementById('loading-indicator')?.remove();
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function setInputEnabled(enabled) {
  document.getElementById('input').disabled = !enabled;
  document.getElementById('send-btn').disabled = !enabled;
}

async function fetchClaude(userQuery) {
  let retries = 0;
  const maxRetries = 5;

  while (retries < maxRetries) {
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1024,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: userQuery }],
        }),
      });
      if (!res.ok) throw new Error("API failed");
      const data = await res.json();
      return data.content?.[0]?.text || "응답을 받지 못했습니다.";
    } catch (err) {
      retries++;
      if (retries === maxRetries) return "서버 연결에 실패했습니다. 잠시 후 다시 시도해 주세요.";
      await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
    }
  }
}

async function sendMessage(text) {
  if (!text || !text.trim() || isLoading) return;
  if (!API_KEY) { if (!promptApiKey()) return; }
  isLoading = true;
  document.getElementById('input').value = '';
  setInputEnabled(false);

  addMessage('user', text.trim());
  showLoading();

  const reply = await fetchClaude(text.trim());

  hideLoading();
  addMessage('assistant', reply);

  isLoading = false;
  setInputEnabled(true);
  document.getElementById('input').focus();
}

function resetChat() {
  const container = document.getElementById('messages');
  // Keep only the welcome card (first child)
  while (container.children.length > 1) {
    container.removeChild(container.lastChild);
  }
  addMessage('assistant', '대화가 초기화되었습니다. 다시 무엇을 도와드릴까요?');
}

// Initial greeting
addMessage('assistant', '반갑습니다! 2026 국세청 인증 모범납세자 맛집 안내 챗봇입니다.\n\n신뢰할 수 있는 식당들만 엄선하여 알려드립니다. 지역이나 메뉴를 말씀해 주세요! 🎖️');
